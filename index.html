<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dresdner Ratsinformationen – Suche</title>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

    :root {
      --bg:       #0f1117;
      --surface:  #181c27;
      --border:   #2a2f3e;
      --accent:   #4f7fff;
      --accent2:  #a78bfa;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --tag-v:    #1e3a5f;  /* Vorlage */
      --tag-a:    #1f3a2a;  /* Antrag */
      --tag-p:    #3b2a1a;  /* Petition */
      --tag-top:  #2a1f3a;  /* Tagesordnung */
      --tag-anf:  #2a2a1a;  /* Anfrage */
      --green:    #34d399;
      --amber:    #fbbf24;
      --red:      #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      background: rgba(15,17,23,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .logo span { color: var(--muted); }

    /* ── Search bar ── */
    .search-wrap {
      flex: 1;
      max-width: 640px;
      position: relative;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 44px 10px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #clearBtn {
      display: none;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
    }
    #clearBtn:hover { color: var(--text); }

    /* ── AI toggle (prepared, off by default) ── */
    .ai-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .ai-badge input { display: none; }
    .ai-toggle {
      width: 32px; height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background .2s;
    }
    .ai-toggle::after {
      content:'';
      position: absolute;
      left: 2px; top: 2px;
      width: 14px; height: 14px;
      border-radius: 7px;
      background: var(--muted);
      transition: left .2s, background .2s;
    }
    .ai-badge input:checked ~ .ai-toggle { background: var(--accent); }
    .ai-badge input:checked ~ .ai-toggle::after { left: 16px; background: #fff; }
    .ai-badge input:checked ~ span { color: var(--accent); }
    .ai-label { font-family: 'DM Mono', monospace; }

    /* ── Filters ── */
    .filters {
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: 0.03em;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    select.filter-select {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    select.filter-select:focus { border-color: var(--accent); color: var(--text); }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 120px);
    }

    /* ── Sidebar ── */
    aside {
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      font-size: 12px;
    }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .facet-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .1s;
      gap: 4px;
    }
    .facet-item:hover { background: var(--surface); }
    .facet-item.active { background: rgba(79,127,255,.15); color: var(--accent); }
    .facet-name { flex: 1; }
    .facet-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--border);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ── Results ── */
    main { padding: 0; overflow: hidden; }

    .results-header {
      padding: 12px 24px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .results-count { color: var(--accent); }

    /* ── AI answer box ── */
    #aiAnswer {
      display: none;
      margin: 16px 24px;
      padding: 16px 20px;
      background: linear-gradient(135deg, rgba(79,127,255,.08), rgba(167,139,250,.08));
      border: 1px solid rgba(79,127,255,.3);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
    }
    #aiAnswer .ai-label-hd {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    #aiAnswer .ai-thinking {
      color: var(--muted);
      font-style: italic;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ── Result cards ── */
    #resultsList { padding: 12px 0; }

    .result-card {
      padding: 14px 24px;
      border-bottom: 1px solid rgba(42,47,62,.6);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      transition: background .1s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .result-card:hover { background: var(--surface); }

    .card-main {}
    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .card-title mark {
      background: rgba(79,127,255,.25);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .tag-vorlage  { background: var(--tag-v);   color: #93c5fd; }
    .tag-antrag   { background: var(--tag-a);   color: #86efac; }
    .tag-petition { background: var(--tag-p);   color: #fdba74; }
    .tag-top      { background: var(--tag-top); color: #c4b5fd; }
    .tag-anfrage  { background: var(--tag-anf); color: #fde68a; }

    .meta-ref {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
    }
    .meta-date { font-size: 12px; color: var(--muted); }
    .meta-gremium { font-size: 12px; color: var(--muted); }

    .card-consultations {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .consult-pill {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }
    .consult-pill.beschliessend { border-color: rgba(52,211,153,.3); color: var(--green); }
    .consult-pill.beratend      { border-color: rgba(251,191,36,.25); color: var(--amber); }

    .card-link {
      align-self: start;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .15s;
    }
    .result-card:hover .card-link { opacity: 1; }

    /* ── Empty/loading states ── */
    .state-message {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }
    .state-message strong { display: block; font-size: 32px; margin-bottom: 12px; color: var(--border); }

    /* ── Load more ── */
    #loadMore {
      display: none;
      margin: 16px auto;
      padding: 8px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    #loadMore:hover { border-color: var(--accent); color: var(--text); }

    .load-wrap { text-align: center; padding: 12px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
      header { padding: 12px 16px; gap: 12px; }
      .filters { padding: 10px 16px; }
      .result-card { padding: 12px 16px; }
      .results-header { padding: 10px 16px; }
      #resultsList { padding: 8px 0; }
      #aiAnswer { margin: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">RATSSEARCH<span>/DD</span></div>

  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Thema, Vorlagennummer, Stichwort …" autocomplete="off" spellcheck="false">
    <svg class="search-icon" id="searchIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <button id="clearBtn" title="Löschen">×</button>
  </div>

  <!-- KI-Integration: vorbereitet, standardmäßig deaktiviert -->
  <label class="ai-badge" title="KI-gestützte semantische Suche (API-Key erforderlich)">
    <input type="checkbox" id="aiToggle" disabled>
    <div class="ai-toggle"></div>
    <span class="ai-label">KI</span>
  </label>
</header>

<div class="filters" id="filtersBar">
  <button class="filter-btn active" data-type="all">Alle</button>
  <button class="filter-btn" data-type="vorlage">Vorlagen</button>
  <button class="filter-btn" data-type="antrag">Anträge</button>
  <button class="filter-btn" data-type="petition">Petitionen</button>
  <button class="filter-btn" data-type="anfrage">Anfragen</button>
  <button class="filter-btn" data-type="top">Tagesordnung</button>
  <select class="filter-select" id="yearFilter">
    <option value="">Alle Jahre</option>
  </select>
  <select class="filter-select" id="gremiumFilter">
    <option value="">Alle Gremien</option>
  </select>
</div>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Dokumenttyp</div>
      <div id="typeFacets"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Jahr</div>
      <div id="yearFacets"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Gremium</div>
      <div id="gremiumFacets"></div>
    </div>
  </aside>

  <main>
    <div class="results-header" id="resultsHeader">
      <span id="resultsCount" class="results-count">–</span>
      <span id="resultsLabel"></span>
    </div>

    <div id="aiAnswer">
      <div class="ai-label-hd">▸ KI-Zusammenfassung</div>
      <div id="aiText"></div>
    </div>

    <div id="resultsList">
      <div class="state-message">
        <strong>⏳</strong>
        Index wird geladen …
      </div>
    </div>

    <div class="load-wrap"><button id="loadMore">Weitere Ergebnisse laden</button></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
  INDEX_URL:     'search-index.json',
  PAGE_SIZE:     30,

  // ── KI-Integration (vorbereitet) ──────────────────────────────
  // Zum Aktivieren:
  //   1. Eintragen: AI_API_KEY = 'sk-ant-...'
  //   2. Schalter einschalten: AI_ENABLED = true
  //   3. Im HTML: id="aiToggle" disabled → disabled entfernen
  AI_ENABLED:    false,
  AI_API_KEY:    '',   // ← hier API-Key eintragen
  AI_MODEL:      'claude-sonnet-4-20250514',
  AI_MAX_TOKENS: 500,
};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let allData    = [];
let fuse       = null;
let results    = [];
let page       = 0;
let activeType = 'all';
let activeYear = '';
let activeGrem = '';

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
async function boot() {
  updateStatus('Lade Index …');
  try {
    const res  = await fetch(CONFIG.INDEX_URL);
    allData    = await res.json();
    fuse = new Fuse(allData, {
      keys: [
        { name: 'n',  weight: 3 },   // Titel
        { name: 'r',  weight: 5 },   // Vorlagennummer (exakter Match wichtig)
        { name: 'pt', weight: 1 },
        { name: 'sn', weight: 1 },
      ],
      threshold:    0.35,
      minMatchCharLength: 2,
      includeScore: true,
      includeMatches: true,
      ignoreLocation: true,
      useExtendedSearch: true,
    });
    buildYearSelect();
    buildGremiumSelect();
    const allWrapped = allData.map(item => ({item, matches: [], score: 1}));
    buildFacets(allWrapped);
    results = allWrapped;
    renderResults(allWrapped.slice(0, CONFIG.PAGE_SIZE));
    page = 1;
    document.getElementById('loadMore').style.display =
      allData.length > CONFIG.PAGE_SIZE ? 'inline-block' : 'none';
    document.getElementById('resultsCount').textContent = allData.length.toLocaleString('de');
    document.getElementById('resultsLabel').textContent = 'Einträge gesamt';
  } catch(e) {
    updateStatus('Fehler beim Laden des Index: ' + e.message);
  }
}

function updateStatus(msg) {
  document.getElementById('resultsLabel').textContent = msg;
}

// ═══════════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════════
let debounceTimer;

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  document.getElementById('searchIcon').style.display = q ? 'none' : 'block';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => runSearch(q), 200);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  const inp = document.getElementById('searchInput');
  inp.value = '';
  inp.dispatchEvent(new Event('input'));
  inp.focus();
});

function runSearch(q) {
  page = 0;
  if (!q) {
    let allWrapped = allData.map(item => ({item, matches: [], score: 1}));
    allWrapped = applyFilters(allWrapped);
    results = allWrapped;
    renderResults(allWrapped.slice(0, CONFIG.PAGE_SIZE));
    buildFacets(allWrapped);
    page = 1;
    document.getElementById('loadMore').style.display =
      allWrapped.length > CONFIG.PAGE_SIZE ? 'inline-block' : 'none';
    document.getElementById('resultsCount').textContent = allWrapped.length.toLocaleString('de');
    document.getElementById('resultsLabel').textContent = 'Einträge gesamt';
    document.getElementById('aiAnswer').style.display = 'none';
    return;
  }

  if (!fuse) {
    document.getElementById('resultsList').innerHTML =
      '<div class="state-message"><strong>⏳</strong>Index wird noch geladen – bitte kurz warten.</div>';
    return;
  }

  // Fuse-Suche
  let raw = fuse.search(q);

  // Filter
  raw = applyFilters(raw);
  results = raw;

  renderResults(raw.slice(0, CONFIG.PAGE_SIZE));
  buildFacets(raw);

  document.getElementById('resultsCount').textContent = raw.length.toLocaleString('de');
  document.getElementById('resultsLabel').textContent =
    raw.length === 1 ? 'Ergebnis' : 'Ergebnisse';

  const loadMore = document.getElementById('loadMore');
  loadMore.style.display = raw.length > CONFIG.PAGE_SIZE ? 'inline-block' : 'none';
  page = 1;

  // KI-Zusammenfassung (falls aktiviert)
  if (CONFIG.AI_ENABLED && document.getElementById('aiToggle').checked) {
    runAiSummary(q, raw.slice(0, 20));
  }
}

function applyFilters(raw) {
  return raw.filter(r => {
    const item = r.item;
    // Typ-Filter
    if (activeType !== 'all') {
      const cat = categorize(item);
      if (cat !== activeType) return false;
    }
    // Jahr-Filter
    if (activeYear && (!item.d || !item.d.startsWith(activeYear))) return false;
    // Gremium-Filter
    if (activeGrem) {
      const grems = item.g || [];
      if (!grems.some(g => g === activeGrem)) return false;
    }
    return true;
  });
}

function categorize(item) {
  if (item.t === 'a') return 'top';
  const pt = (item.pt || '').toLowerCase();
  if (pt.includes('petition')) return 'petition';
  if (pt.includes('anfrage') || pt.startsWith('mündliche') || pt.includes('einwohner')) return 'anfrage';
  if (pt.includes('antrag')) return 'antrag';
  return 'vorlage';
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function renderResults(fuseItems) {
  const list = document.getElementById('resultsList');
  if (!fuseItems.length) {
    list.innerHTML = '<div class="state-message"><strong>∅</strong>Keine Treffer. Anderen Begriff versuchen.</div>';
    return;
  }
  list.innerHTML = fuseItems.map(fi => cardHTML(fi.item, fi.matches)).join('');
}

function appendResults(fuseItems) {
  const list = document.getElementById('resultsList');
  list.insertAdjacentHTML('beforeend', fuseItems.map(fi => cardHTML(fi.item, fi.matches)).join(''));
}

function cardHTML(item, matches) {
  const cat     = categorize(item);
  const tagMap  = {
    vorlage:  ['tag-vorlage',  'Vorlage'],
    antrag:   ['tag-antrag',   'Antrag'],
    petition: ['tag-petition', 'Petition'],
    anfrage:  ['tag-anfrage',  'Anfrage'],
    top:      ['tag-top',      'TO-Punkt'],
  };
  const [tagClass, tagLabel] = tagMap[cat] || ['tag-vorlage','?'];

  // Highlight-Titel
  let title = escHtml(item.n || '—');
  if (matches) {
    const nm = matches.find(m => m.key === 'n');
    if (nm) title = highlightMatches(item.n || '', nm.indices);
  }

  // Typ-Badge
  const ptLabel = item.pt ? escHtml(item.pt) : tagLabel;

  // Datum
  const date = item.d ? formatDate(item.d) : '';

  // Gremien
  const gremText = (item.g || []).filter(Boolean).join(' · ');

  // Sitzungskontext (für Tagesordnungspunkte)
  const sitzung = item.sn ? `<span class="meta-gremium">${escHtml(item.sn)}</span>` : '';

  // Beratungsvorgänge (für Vorlagen)
  let consultHTML = '';
  if (item.c && item.c.length) {
    const pills = item.c.map(c => {
      const cls = c.role === 'beschließend' ? 'beschliessend'
                : c.role === 'beratend'     ? 'beratend' : '';
      return `<a href="${c.url}" target="_blank" class="consult-pill ${cls}"
                 title="${escHtml(c.role)}" onclick="event.stopPropagation()">
                ${escHtml(c.gremium)} ${c.date.slice(0,4)}
              </a>`;
    }).join('');
    consultHTML = `<div class="card-consultations">${pills}</div>`;
  }

  const href = item.u || '#';

  return `<a class="result-card" href="${href}" target="_blank" rel="noopener">
    <div class="card-main">
      <div class="card-title">${title}</div>
      <div class="card-meta">
        <span class="tag ${tagClass}">${escHtml(ptLabel)}</span>
        ${item.r ? `<span class="meta-ref">${escHtml(item.r)}</span>` : ''}
        ${date    ? `<span class="meta-date">${date}</span>` : ''}
        ${gremText ? `<span class="meta-gremium">${escHtml(gremText)}</span>` : ''}
        ${sitzung}
      </div>
      ${consultHTML}
    </div>
    <div class="card-link">↗</div>
  </a>`;
}

function formatDate(d) {
  if (!d || d.length < 10) return d;
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function highlightMatches(text, indices) {
  if (!indices || !indices.length) return escHtml(text);
  let result = '';
  let last = 0;
  for (const [start, end] of indices) {
    result += escHtml(text.slice(last, start));
    result += `<mark>${escHtml(text.slice(start, end+1))}</mark>`;
    last = end + 1;
  }
  result += escHtml(text.slice(last));
  return result;
}

// ═══════════════════════════════════════════════════════════════
//  FILTERS & FACETS
// ═══════════════════════════════════════════════════════════════
document.getElementById('filtersBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeType = btn.dataset.type;
  runSearch(document.getElementById('searchInput').value.trim());
});

document.getElementById('yearFilter').addEventListener('change', function() {
  activeYear = this.value;
  runSearch(document.getElementById('searchInput').value.trim());
});

document.getElementById('gremiumFilter').addEventListener('change', function() {
  activeGrem = this.value;
  runSearch(document.getElementById('searchInput').value.trim());
});

function buildYearSelect() {
  const years = new Set();
  allData.forEach(r => { if (r.d && r.d.length >= 4) years.add(r.d.slice(0,4)); });
  const sel = document.getElementById('yearFilter');
  Array.from(years).sort().reverse().forEach(y => {
    sel.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`);
  });
}

function buildGremiumSelect() {
  const gremCounts = {};
  allData.forEach(r => (r.g || []).forEach(g => { if(g) gremCounts[g] = (gremCounts[g]||0)+1; }));
  const top = Object.entries(gremCounts).sort((a,b)=>b[1]-a[1]).slice(0,40);
  const sel = document.getElementById('gremiumFilter');
  top.forEach(([g,c]) => {
    sel.insertAdjacentHTML('beforeend', `<option value="${escHtml(g)}">${escHtml(g)} (${c})</option>`);
  });
}

function buildFacets(fuseItems) {
  const items = fuseItems.length ? fuseItems.map(f=>f.item) : [];

  // Typ-Facetten
  const typeCounts = { vorlage:0, antrag:0, petition:0, anfrage:0, top:0 };
  items.forEach(r => { typeCounts[categorize(r)] = (typeCounts[categorize(r)]||0)+1; });
  const typeEl = document.getElementById('typeFacets');
  typeEl.innerHTML = Object.entries(typeCounts)
    .map(([k,v]) => `<div class="facet-item" data-ftype="${k}">
      <span class="facet-name">${{vorlage:'Vorlage',antrag:'Antrag',petition:'Petition',anfrage:'Anfrage',top:'TO-Punkt'}[k]}</span>
      <span class="facet-count">${v}</span>
    </div>`).join('');

  // Jahr-Facetten (Top 8)
  const yearCounts = {};
  items.forEach(r => { if(r.d) yearCounts[r.d.slice(0,4)] = (yearCounts[r.d.slice(0,4)]||0)+1; });
  const topYears = Object.entries(yearCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('yearFacets').innerHTML =
    topYears.map(([y,c]) => `<div class="facet-item">
      <span class="facet-name">${y}</span><span class="facet-count">${c}</span>
    </div>`).join('');

  // Gremium-Facetten (Top 8)
  const gremCounts = {};
  items.forEach(r => (r.g||[]).forEach(g => { if(g) gremCounts[g]=(gremCounts[g]||0)+1; }));
  const topGrem = Object.entries(gremCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('gremiumFacets').innerHTML =
    topGrem.map(([g,c]) => `<div class="facet-item">
      <span class="facet-name">${escHtml(g)}</span><span class="facet-count">${c}</span>
    </div>`).join('');
}

// ── Load more ──
document.getElementById('loadMore').addEventListener('click', () => {
  const start = page * CONFIG.PAGE_SIZE;
  const chunk = results.slice(start, start + CONFIG.PAGE_SIZE);
  appendResults(chunk);
  page++;
  if (page * CONFIG.PAGE_SIZE >= results.length)
    document.getElementById('loadMore').style.display = 'none';
});

// ═══════════════════════════════════════════════════════════════
//  KI-INTEGRATION (vorbereitet — wird aktiv wenn AI_ENABLED=true)
// ═══════════════════════════════════════════════════════════════
async function runAiSummary(query, topResults) {
  if (!CONFIG.AI_ENABLED || !CONFIG.AI_API_KEY) return;

  const aiBox  = document.getElementById('aiAnswer');
  const aiText = document.getElementById('aiText');
  aiBox.style.display = 'block';
  aiText.innerHTML = '<span class="ai-thinking">Analysiere Ergebnisse …</span>';

  const context = topResults.slice(0, 15).map(r => {
    const i = r.item;
    return `- ${i.r || ''} | ${i.pt || ''} | ${i.d?.slice(0,4) || ''} | ${i.n}`;
  }).join('\n');

  const prompt = `Du bist Assistent für kommunalpolitische Recherche in Dresden.
Der Nutzer sucht nach: "${query}"

Hier sind die relevantesten Treffer aus dem Dresdner Ratsinfosystem:
${context}

Gib eine knappe Zusammenfassung (3–5 Sätze) auf Deutsch:
- Was wurde zu diesem Thema im Dresdner Stadtrat eingebracht?
- Welche Zeiträume oder Entwicklungen sind erkennbar?
- Welche Gremien/Fraktionen waren aktiv?`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CONFIG.AI_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: CONFIG.AI_MODEL,
        max_tokens: CONFIG.AI_MAX_TOKENS,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data  = await resp.json();
    const text  = data?.content?.[0]?.text || 'Keine Antwort erhalten.';
    aiText.textContent = text;
  } catch(e) {
    aiText.textContent = 'KI-Anfrage fehlgeschlagen: ' + e.message;
  }
}
